name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

      - name: Verify CLI profile command
        run: pocket-ml profile examples/iris_small.csv --target species

      - name: Verify CLI run classification
        run: pocket-ml run examples/iris_small.csv --target species --task classification

      - name: Verify CLI run regression
        run: pocket-ml run examples/house_prices_small.csv --target price --task regression
